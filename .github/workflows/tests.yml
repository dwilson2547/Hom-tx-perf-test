name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Correctness tests (Python + Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install numpy scipy pytest pytest-benchmark

      - name: Install Python htransform package
        run: pip install -e python/

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin
        run: pip install maturin

      - name: Build and install Rust extension
        working-directory: rust
        run: |
          maturin build --release
          pip install target/wheels/htransform_rs-*.whl

      - name: Run correctness tests
        run: pytest tests/test_correctness.py -v
